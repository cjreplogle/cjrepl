<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CJ Replogle</title>
  <style>
    body {
      font-family: Georgia, serif;
      max-width: 600px;
      margin: 80px auto;
      padding: 0 24px;
      color: #222;
      line-height: 1.6;
    }
    .intro {
      display: flex;
      align-items: center;
      gap: 16px;
    }
    .intro img {
      width: 64px;
      height: 64px;
      object-fit: cover;
      flex-shrink: 0;
    }
    #typed::after {
      content: '|';
      animation: blink 0.7s step-end infinite;
    }
    @keyframes blink {
      50% { opacity: 0; }
    }
    @media (prefers-color-scheme: dark) {
      body {
        color: #fff;
        background: #111;
      }
      a {
        color: #7eb8f7;
      }
    }
  </style>
</head>
<body>
  <div class="intro">
    <img src="me.jpg" alt="CJ Replogle">
    <p id="typed"></p>
  </div>
  <script>
    const segments = [
      { text: "Hi, I'm ", html: false },
      { text: "CJ Replogle", html: false, bold: true },
      { text: ". I'm currently a medical student @ ", html: false },
      { text: "University of Cincinnati", html: false, link: "https://med.uc.edu" },
      { text: ". I like making stuff in my research / spare time, this should have most of my public work compiled. :)", html: false },
    ];

    const el = document.getElementById('typed');
    let segIndex = 0, charIndex = 0;

    function buildHTML() {
      let result = '';
      for (let i = 0; i < segIndex; i++) {
        result += wrap(segments[i], segments[i].text);
      }
      if (segIndex < segments.length) {
        result += wrap(segments[segIndex], segments[segIndex].text.slice(0, charIndex));
      }
      return result;
    }

    function wrap(seg, text) {
      if (seg.bold) return `<strong>${text}</strong>`;
      if (seg.link) return `<a href="${seg.link}">${text}</a>`;
      return text;
    }

    function type() {
      if (segIndex >= segments.length) return;
      const seg = segments[segIndex];
      if (charIndex < seg.text.length) {
        charIndex++;
      } else {
        segIndex++;
        charIndex = 0;
        if (segIndex >= segments.length) {
          el.innerHTML = buildHTML();
          return;
        }
      }
      el.innerHTML = buildHTML();
      const ch = seg.text[charIndex - 1];
      const delay = ch === '.' ? 300 : 12;
      setTimeout(type, delay);
    }

    type();
  </script>
</body>
</html>

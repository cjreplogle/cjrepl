<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CJ Replogle</title>
  <style>
    body {
      font-family: Georgia, serif;
      max-width: 600px;
      margin: 80px auto;
      padding: 0 24px;
      color: #222;
      line-height: 1.6;
    }
    .intro {
      display: flex;
      align-items: center;
      gap: 16px;
    }
    .intro img {
      position: fixed;
      top: 16px;
      left: 16px;
      width: 51px;
      height: 51px;
      object-fit: cover;
      opacity: 0;
      animation: fadein 1s ease forwards;
    }
    @keyframes fadein {
      to { opacity: 1; }
    }
    #typed::after {
      content: '|';
      animation: blink 0.7s step-end infinite;
    }
    @keyframes blink {
      50% { opacity: 0; }
    }
    a {
      color: #333;
    }
    .url-tag {
      position: fixed;
      top: 20px;
      right: 24px;
      font-size: 0.85rem;
      opacity: 0.4;
    }
    .tabs {
      display: flex;
      flex-direction: column;
      gap: 4px;
      margin-top: 32px;
    }
    .tab-btn {
      display: block;
      padding: 0;
      border: none;
      background: none;
      font-family: Georgia, serif;
      font-size: 1rem;
      color: #222;
      cursor: pointer;
      text-align: left;
      opacity: 0.4;
    }
    .tab-btn:hover, .tab-btn.active {
      opacity: 1;
    }
    .tab-btn:hover {
      transform: translateX(6px);
      transition: transform 0.2s ease;
    }
    .tab-btn {
      transition: transform 0.2s ease, opacity 0.2s ease;
    }
    .tab-content {
      margin-top: 24px;
      display: none;
    }
    .tab-content.active {
      display: block;
    }
    @media (prefers-color-scheme: dark) {
      body {
        color: #fff;
        background: #111;
      }
      a {
        color: #ccc;
      }
      .tab-btn {
        color: #fff;
        background: none;
        border: none;
      }
    }
  </style>
</head>
<body>
  <div class="url-tag">cjre.pl/ogle</div>
  <div class="intro">
    <img src="me.jpg" alt="CJ Replogle">
    <p id="typed"></p>
  </div>
  <div class="tabs">
    <button class="tab-btn" onclick="switchTab('papers', this)">Papers</button>
    <div id="papers" class="tab-content"><p>Coming soon.</p></div>
    <button class="tab-btn" onclick="switchTab('projects', this)">Projects</button>
    <div id="projects" class="tab-content"><p>Coming soon.</p></div>
    <button class="tab-btn" onclick="switchTab('forfun', this)">For Fun</button>
    <div id="forfun" class="tab-content"><p>Coming soon.</p></div>
  </div>

  <script>
    function switchTab(id, btn) {
      const content = document.getElementById(id);
      const isOpen = content.classList.contains('active');
      document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
      document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
      if (!isOpen) {
        content.classList.add('active');
        btn.classList.add('active');
      }
    }
  </script>

  <script>
    const segments = [
      { text: "Hi, I'm ", html: false },
      { text: "CJ Replogle", html: false, bold: true },
      { text: ". I'm currently an incoming medical student @ ", html: false },
      { text: "University of Cincinnati", html: false, link: "https://med.uc.edu" },
      { text: ". I like making stuff in my research / spare time, this should have most of my public work compiled. :)", html: false },
    ];

    const el = document.getElementById('typed');
    let segIndex = 0, charIndex = 0;

    function buildHTML(scrambleChar) {
      let result = '';
      for (let i = 0; i < segIndex; i++) {
        result += wrap(segments[i], segments[i].text);
      }
      if (segIndex < segments.length) {
        let text = segments[segIndex].text.slice(0, charIndex);
        if (scrambleChar !== undefined) text = text.slice(0, -1) + scrambleChar;
        result += wrap(segments[segIndex], text);
      }
      return result;
    }

    function wrap(seg, text) {
      if (seg.bold) return `<strong>${text}</strong>`;
      if (seg.link) return `<a href="${seg.link}">${text}</a>`;
      return text;
    }

    const scrambleChars = 'ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz0123456789';
    let scrambling = false;

    function randChar() {
      return scrambleChars[Math.floor(Math.random() * scrambleChars.length)];
    }

    function scrambleThen(realChar, done) {
      scrambling = true;
      let ticks = 4;
      function tick() {
        if (ticks-- <= 0) { scrambling = false; done(); return; }
        el.innerHTML = buildHTML(realChar === ' ' ? ' ' : randChar());
        setTimeout(tick, 30);
      }
      tick();
    }

    function type() {
      if (segIndex >= segments.length) return;
      const seg = segments[segIndex];
      if (charIndex < seg.text.length) {
        charIndex++;
      } else {
        segIndex++;
        charIndex = 0;
        if (segIndex >= segments.length) {
          el.innerHTML = buildHTML();
          el.contentEditable = 'true';
          el.focus();
          return;
        }
      }
      const ch = seg.text[charIndex - 1];
      const delay = ch === '.' ? 300 : 12;
      if (ch.match(/\S/)) {
        scrambleThen(ch, () => setTimeout(type, delay));
      } else {
        el.innerHTML = buildHTML();
        setTimeout(type, delay);
      }
    }

    function reset() {
      el.contentEditable = 'false';
      segIndex = segments.length;
      charIndex = 0;
      el.innerHTML = buildHTML();
      el.contentEditable = 'true';
      el.focus();
    }

    el.addEventListener('keydown', function(e) {
      if (e.key === 'Backspace') {
        e.preventDefault();
        reset();
      }
    });

    type();
  </script>
</body>
</html>

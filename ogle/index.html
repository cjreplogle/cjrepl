<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CJ Replogle</title>
  <style>
    body {
      font-family: Georgia, serif;
      max-width: 600px;
      margin: 80px auto;
      padding: 0 24px;
      color: #222;
      line-height: 1.6;
    }
    .intro {
      display: flex;
      align-items: center;
      gap: 16px;
    }
    .intro img {
      position: fixed;
      top: 16px;
      left: 16px;
      width: 64px;
      height: 64px;
      object-fit: cover;
    }
    #typed::after {
      content: '|';
      animation: blink 0.7s step-end infinite;
    }
    @keyframes blink {
      50% { opacity: 0; }
    }
    a {
      color: #333;
    }
    .url-tag {
      position: fixed;
      top: 20px;
      right: 24px;
      font-size: 0.85rem;
      opacity: 0.4;
    }
    .tabs {
      display: flex;
      flex-direction: column;
      gap: 4px;
      margin-top: 32px;
    }
    .tab-btn {
      display: block;
      padding: 0;
      border: none;
      background: none;
      font-family: Georgia, serif;
      font-size: 1rem;
      color: #222;
      cursor: pointer;
      text-align: left;
      opacity: 0.4;
    }
    .tab-btn:hover, .tab-btn.active {
      opacity: 1;
    }
    .tab-content {
      margin-top: 24px;
      display: none;
    }
    .tab-content.active {
      display: block;
    }
    @media (prefers-color-scheme: dark) {
      body {
        color: #fff;
        background: #111;
      }
      a {
        color: #ccc;
      }
      .tab-btn {
        color: #fff;
        background: none;
        border: none;
      }
    }
  </style>
</head>
<body>
  <div class="url-tag">cjre.pl/ogle</div>
  <div class="intro">
    <img src="me.jpg" alt="CJ Replogle">
    <p id="typed"></p>
  </div>
  <div class="tabs">
    <button class="tab-btn" onclick="switchTab('papers')">Papers</button>
    <button class="tab-btn" onclick="switchTab('projects')">Projects</button>
    <button class="tab-btn" onclick="switchTab('forfun')">For Fun</button>
  </div>
  <div id="papers" class="tab-content">
    <p>Coming soon.</p>
  </div>
  <div id="projects" class="tab-content">
    <p>Coming soon.</p>
  </div>
  <div id="forfun" class="tab-content">
    <p>Coming soon.</p>
  </div>

  <script>
    function switchTab(id) {
      document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
      document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
      document.getElementById(id).classList.add('active');
      event.target.classList.add('active');
    }
  </script>

  <script>
    const segments = [
      { text: "Hi, I'm ", html: false },
      { text: "CJ Replogle", html: false, bold: true },
      { text: ". I'm currently a medical student @ ", html: false },
      { text: "University of Cincinnati", html: false, link: "https://med.uc.edu" },
      { text: ". I like making stuff in my research / spare time, this should have most of my public work compiled. :)", html: false },
    ];

    const el = document.getElementById('typed');
    let segIndex = 0, charIndex = 0;

    function buildHTML() {
      let result = '';
      for (let i = 0; i < segIndex; i++) {
        result += wrap(segments[i], segments[i].text);
      }
      if (segIndex < segments.length) {
        result += wrap(segments[segIndex], segments[segIndex].text.slice(0, charIndex));
      }
      return result;
    }

    function wrap(seg, text) {
      if (seg.bold) return `<strong>${text}</strong>`;
      if (seg.link) return `<a href="${seg.link}">${text}</a>`;
      return text;
    }

    function type() {
      if (segIndex >= segments.length) return;
      const seg = segments[segIndex];
      if (charIndex < seg.text.length) {
        charIndex++;
      } else {
        segIndex++;
        charIndex = 0;
        if (segIndex >= segments.length) {
          el.innerHTML = buildHTML();
          return;
        }
      }
      el.innerHTML = buildHTML();
      const ch = seg.text[charIndex - 1];
      const delay = ch === '.' ? 300 : 12;
      setTimeout(type, delay);
    }

    type();
  </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ruminations — edit</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; }
    html, body { margin: 0; padding: 0; height: 100%; background: #000; color: #fff; font-family: Georgia, serif; }

    #backdrop-wrap {
      position: fixed; bottom: 0; left: 0; right: 0; height: 100vh;
      pointer-events: none; display: flex; flex-direction: column; justify-content: flex-end;
      -webkit-mask-image: linear-gradient(to top, rgba(0,0,0,0.9) 0%, rgba(0,0,0,0.75) 30%, rgba(0,0,0,0.5) 60%, rgba(0,0,0,0.15) 85%, transparent 100%);
      mask-image:          linear-gradient(to top, rgba(0,0,0,0.9) 0%, rgba(0,0,0,0.75) 30%, rgba(0,0,0,0.5) 60%, rgba(0,0,0,0.15) 85%, transparent 100%);
      z-index: 0; overflow: hidden;
    }
    #fire {
      font-family: monospace; font-size: 0.75rem; line-height: 1.15;
      white-space: pre; overflow: hidden; width: 115%;
      -webkit-text-size-adjust: none; text-size-adjust: none;
    }

    #wrap {
      position: relative; z-index: 1;
      max-width: 560px; margin: 0 auto;
      padding: 0 28px;
      min-height: 100vh; display: flex; flex-direction: column; justify-content: center;
      padding-top: 15vh;
    }

    /* Chrome fades out when typing */
    #chrome { transition: opacity 0.4s ease; }
    body.typing #chrome { opacity: 0; pointer-events: none; }

    #chrome h2 {
      font-size: 0.85rem; font-weight: normal; opacity: 0.35;
      margin: 0 0 48px; letter-spacing: 0.04em;
    }
    #chrome h2 a { color: inherit; text-decoration: none; }

    /* Login */
    #login-view label { display: block; font-size: 0.8rem; opacity: 0.45; margin-bottom: 6px; }
    #login-view input {
      width: 100%; background: none; border: none; border-bottom: 1px solid rgba(255,255,255,0.2);
      color: #fff; font-family: Georgia, serif; font-size: 1rem; padding: 4px 0 6px;
      outline: none; transition: border-color 0.2s;
      caret-color: rgba(255,255,255,0.8);
    }
    #login-view input:focus { border-bottom-color: rgba(255,255,255,0.6); }

    /* Post view */
    #post-view { flex: 1; display: flex; flex-direction: column; }

    #body {
      flex: 1; min-height: 220px;
      background: none; border: none;
      color: #fff; font-family: Georgia, serif; font-size: 1.05rem;
      line-height: 1.7; resize: none; outline: none;
      caret-color: rgba(255,255,255,0.8);
      width: 100%;
    }
    #body::placeholder { color: rgba(255,255,255,0.15); }

    /* Bottom bar */
    .actions {
      display: flex; align-items: center; gap: 20px;
      transition: opacity 0.4s ease;
    }
    #post-view .actions {
      position: fixed; bottom: 24px;
      left: max(28px, calc(50vw - 252px));
    }
    body.typing #post-view .actions { opacity: 0.12; }
    body.typing #post-view .actions:hover { opacity: 1; }

    button.btn {
      background: none; border: 1px solid rgba(255,255,255,0.25); color: #fff;
      font-family: Georgia, serif; font-size: 0.88rem;
      padding: 5px 18px; border-radius: 3px; cursor: pointer;
      transition: border-color 0.2s;
    }
    button.btn:hover { border-color: rgba(255,255,255,0.6); }

    .hint { font-size: 0.72rem; opacity: 0.25; }
    .hint kbd {
      background: rgba(255,255,255,0.08); border-radius: 3px;
      padding: 1px 5px; font-family: Georgia, serif; font-size: 0.7rem;
    }

    #wordcount { font-size: 0.75rem; opacity: 0.2; margin-left: auto; transition: opacity 0.2s; }
    #wordcount.active { opacity: 0.45; }

    #status { font-size: 0.8rem; opacity: 0.45; margin: 0; }

    #signout-btn {
      position: fixed; bottom: 24px; right: 28px;
      font-size: 0.78rem; opacity: 0.25; color: #fff; text-decoration: none;
      font-family: Georgia, serif; transition: opacity 0.2s; z-index: 10;
    }
    #signout-btn:hover { opacity: 0.6; }
  </style>
</head>
<body>

<div id="backdrop-wrap">
  <div id="fire"></div>
</div>

<div id="wrap">
  <div id="chrome">
    <h2><a href="/">cjre.pl — ruminations</a></h2>
  </div>

  <div id="login-view">
    <label>password</label>
    <input type="password" id="token" placeholder="···" autocomplete="current-password"
           onkeydown="if(event.key==='Enter')login()">
    <div class="actions" style="margin-top:28px;position:relative">
      <button class="btn primary" onclick="login()">sign in</button>
      <p id="status"></p>
    </div>
  </div>

  <div id="post-view" style="display:none">
    <p style="font-size:0.82rem;opacity:0.3;margin:0 0 10px;letter-spacing:0.03em">new rumination</p>
    <textarea id="body" placeholder="write something…" spellcheck="false"
              oninput="onType()" onblur="stopTyping()"></textarea>
    <div class="actions">
      <button class="btn primary" onclick="publish()">publish</button>
      <span class="hint"><kbd>tab</kbd> + <kbd>enter</kbd></span>
      <p id="status"></p>
      <span id="wordcount">0w</span>
    </div>
  </div>
</div>

<a id="signout-btn" href="#" onclick="logout();return false" style="display:none">sign out</a>

<div id="backdrop-panel" style="opacity:0;pointer-events:none;transition:opacity 0.2s ease,transform 0.2s ease;transform:translateY(4px);position:fixed;bottom:48px;left:10px;font-size:0.75rem;color:inherit;background:rgba(128,128,128,0.18);-webkit-backdrop-filter:blur(14px);backdrop-filter:blur(14px);border:1px solid rgba(128,128,128,0.25);border-radius:6px;padding:8px 10px;z-index:10;box-shadow:0 4px 16px rgba(0,0,0,0.18);min-width:180px">
  <div style="margin-bottom:6px">
    <span style="opacity:0.5;margin-right:6px">backdrop</span>
    <button onclick="setBackdrop('water')"     id="bd-water"     style="font:inherit;background:none;border:none;cursor:pointer;padding:0 4px;opacity:0.6">water</button>
    <button onclick="setBackdrop('fire')"      id="bd-fire"      style="font:inherit;background:none;border:none;cursor:pointer;padding:0 4px;opacity:0.6">fire</button>
    <button onclick="setBackdrop('clouds')"    id="bd-clouds"    style="font:inherit;background:none;border:none;cursor:pointer;padding:0 4px;opacity:0.6">air</button>
    <button onclick="setBackdrop('rays')"      id="bd-rays"      style="font:inherit;background:none;border:none;cursor:pointer;padding:0 4px;opacity:0.6">rays</button>
    <button onclick="setBackdrop('fireworks')" id="bd-fireworks" style="font:inherit;background:none;border:none;cursor:pointer;padding:0 4px;opacity:0.6">fireworks</button>
    <button onclick="setBackdrop('snow')"      id="bd-snow"      style="font:inherit;background:none;border:none;cursor:pointer;padding:0 4px;opacity:0.6">snow</button>
    <button onclick="setBackdrop('borealis')"  id="bd-borealis"  style="font:inherit;background:none;border:none;cursor:pointer;padding:0 4px;opacity:0.6">borealis</button>
    <button onclick="setBackdrop('off')"       id="bd-off"       style="font:inherit;background:none;border:none;cursor:pointer;padding:0 4px;opacity:0.6">off</button>
  </div>
  <div style="display:grid;grid-template-columns:max-content 1fr;gap:4px 8px;align-items:center;margin-top:4px">
    <span style="opacity:0.5;font-size:0.7rem">opacity</span>
    <input id="bd-opacity" type="range" min="0" max="1" step="0.05" style="accent-color:currentColor" oninput="setBackdropOpacity(this.value)">
    <span style="opacity:0.5;font-size:0.7rem">speed</span>
    <input id="bd-speed" type="range" min="0.25" max="4" step="0.05" style="accent-color:currentColor" oninput="setBackdropSpeed(this.value)">
  </div>
</div>
<button onclick="toggleBackdropPanel()" style="position:fixed;bottom:22px;left:10px;font:inherit;font-size:1.2rem;background:none;border:none;cursor:pointer;padding:0;opacity:0.35;color:inherit;z-index:10" title="backdrop">◈</button>

<script>
  (function() {
    const name = localStorage.getItem('backdrop') || 'fire';
    const wrap = document.getElementById('backdrop-wrap');
    wrap.style.opacity = parseFloat(localStorage.getItem('backdropOpacity') || '0.82');
    window._backdropSpeed = parseFloat(localStorage.getItem('backdropSpeed') || '1');
    const s = document.createElement('script');
    s.src = name + '.js';
    document.head.appendChild(s);
  })();

  const BACKDROP_WRAP = document.getElementById('backdrop-wrap');
  function getBackdropOpacity() { return parseFloat(localStorage.getItem('backdropOpacity') || '0.82'); }
  function setBackdropOpacity(val) { localStorage.setItem('backdropOpacity', val); BACKDROP_WRAP.style.opacity = val; }
  function setBackdropSpeed(val) { localStorage.setItem('backdropSpeed', val); window._backdropSpeed = parseFloat(val); }

  function _bdPanelOpen() { return document.getElementById('backdrop-panel').style.opacity === '1'; }
  function toggleBackdropPanel() {
    const p = document.getElementById('backdrop-panel');
    const opening = !_bdPanelOpen();
    p.style.opacity = opening ? '1' : '0';
    p.style.pointerEvents = opening ? '' : 'none';
    p.style.transform = opening ? 'translateY(0)' : 'translateY(4px)';
    if (opening) {
      document.getElementById('bd-opacity').value = getBackdropOpacity();
      document.getElementById('bd-speed').value = localStorage.getItem('backdropSpeed') || '1';
      const mode = localStorage.getItem('backdrop') || 'fire';
      document.querySelectorAll('#backdrop-panel button').forEach(b => b.style.fontWeight = '');
      const active = document.getElementById('bd-' + mode);
      if (active) active.style.fontWeight = 'bold';
    }
  }

  const _bdScripts = {
    water:'water.js',fire:'fire.js',rays:'rays.js',
    clouds:'clouds.js',fireworks:'fireworks.js',snow:'snow.js',borealis:'borealis.js'
  };
  const _bdLoaded = new Set();
  setTimeout(() => {
    const current = localStorage.getItem('backdrop') || 'fire';
    Object.entries(_bdScripts).forEach(([mode, src]) => {
      if (mode === current || _bdLoaded.has(mode)) return;
      _bdLoaded.add(mode);
      const s = document.createElement('script'); s.src = src;
      document.head.appendChild(s);
    });
  }, 2000);
  function setBackdrop(mode) {
    localStorage.setItem('backdrop', mode);
    ['Water','Fire','Voronoi','Rays','Clouds','Fireworks','Snow','Borealis'].forEach(n => {
      if (window['stop'+n]) window['stop'+n]();
    });
    const startKey = 'start' + mode.charAt(0).toUpperCase() + mode.slice(1);
    function doStart() { if (window[startKey]) window[startKey](); }
    if (_bdScripts[mode] && !_bdLoaded.has(mode)) {
      _bdLoaded.add(mode);
      const s = document.createElement('script'); s.src = _bdScripts[mode]; s.onload = doStart;
      document.head.appendChild(s);
    } else { doStart(); }
    document.querySelectorAll('#backdrop-panel button').forEach(b => b.style.fontWeight = '');
    const active = document.getElementById('bd-' + mode);
    if (active) active.style.fontWeight = 'bold';
    const p = document.getElementById('backdrop-panel');
    p.style.opacity = '0'; p.style.pointerEvents = 'none'; p.style.transform = 'translateY(4px)';
  }

  document.addEventListener('click', e => {
    if (!_bdPanelOpen()) return;
    const panel = document.getElementById('backdrop-panel');
    if (!panel.contains(e.target) && !e.target.closest('button[onclick="toggleBackdropPanel()"]')) {
      panel.style.opacity = '0'; panel.style.pointerEvents = 'none'; panel.style.transform = 'translateY(4px)';
    }
  });
</script>

<script>
  const WORKER_URL = 'https://ruminations-worker.cjreplogle.workers.dev';
  const KEY = 'ruminations_authed';

  const statusEl = document.getElementById('status');
  function setStatus(msg, type) {
    statusEl.textContent = msg;
    statusEl.className = type || '';
  }

  // Tab+Enter to publish
  document.getElementById('body').addEventListener('keydown', e => {
    if (e.key === 'Enter' && e.target._tabHeld) { e.preventDefault(); publish(); }
  });
  document.addEventListener('keydown', e => {
    if (e.key === 'Tab' && document.getElementById('post-view').style.display !== 'none') {
      e.preventDefault();
      document.getElementById('body')._tabHeld = true;
    }
  });
  document.addEventListener('keyup', e => {
    if (e.key === 'Tab') document.getElementById('body')._tabHeld = false;
  });

  let _typingTimer;
  function onType() {
    document.body.classList.add('typing');
    clearTimeout(_typingTimer);
    _typingTimer = setTimeout(stopTyping, 1500);
    const words = document.getElementById('body').value.trim().split(/\s+/).filter(Boolean).length;
    const wc = document.getElementById('wordcount');
    wc.textContent = words + 'w';
    wc.className = words > 0 ? 'active' : '';
  }
  function stopTyping() { document.body.classList.remove('typing'); }

  async function login() {
    const pw = document.getElementById('token').value.trim();
    if (!pw) { setStatus('enter password', 'err'); return; }
    localStorage.setItem(KEY, pw);
    showPostView();
  }

  function logout() {
    localStorage.removeItem(KEY);
    document.getElementById('login-view').style.display = '';
    document.getElementById('post-view').style.display = 'none';
    document.getElementById('signout-btn').style.display = 'none';
    document.getElementById('token').value = '';
    setStatus('');
  }

  function showPostView() {
    document.getElementById('login-view').style.display = 'none';
    document.getElementById('post-view').style.display = 'flex';
    document.getElementById('signout-btn').style.display = '';
    setStatus('');
    setTimeout(() => document.getElementById('body').focus(), 50);
  }

  async function publish() {
    const password = localStorage.getItem(KEY);
    const body = document.getElementById('body').value.trim();
    if (!body) { setStatus('write something first', 'err'); return; }
    setStatus('publishing…');
    try {
      const res = await fetch(WORKER_URL, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ password, body }),
      });
      const data = await res.json();
      if (data.ok) {
        setStatus('published', 'ok');
        document.getElementById('body').value = '';
        document.getElementById('wordcount').textContent = '0w';
        document.getElementById('wordcount').className = '';
        stopTyping();
      } else if (res.status === 401) {
        setStatus('wrong password', 'err');
        logout();
      } else {
        setStatus('error: ' + (data.error || res.status), 'err');
      }
    } catch(e) { setStatus('error: ' + e.message, 'err'); }
  }

  if (localStorage.getItem(KEY)) showPostView();
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ruminations — edit</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; }
    html, body { margin: 0; padding: 0; height: 100%; background: #000; color: #fff; font-family: Georgia, serif; }

    #backdrop-wrap {
      position: fixed; bottom: 0; left: 0; right: 0; height: 100vh;
      pointer-events: none; display: flex; flex-direction: column; justify-content: flex-end;
      -webkit-mask-image: linear-gradient(to top, rgba(0,0,0,0.9) 0%, rgba(0,0,0,0.75) 30%, rgba(0,0,0,0.5) 60%, rgba(0,0,0,0.15) 85%, transparent 100%);
      mask-image:          linear-gradient(to top, rgba(0,0,0,0.9) 0%, rgba(0,0,0,0.75) 30%, rgba(0,0,0,0.5) 60%, rgba(0,0,0,0.15) 85%, transparent 100%);
      z-index: 0; overflow: hidden;
    }
    #fire {
      font-family: monospace; font-size: 0.75rem; line-height: 1.15;
      white-space: pre; overflow: hidden; width: 115%;
      -webkit-text-size-adjust: none; text-size-adjust: none;
    }

    #wrap {
      position: relative; z-index: 1;
      max-width: 560px; margin: 0 auto;
      padding: 60px 28px 60px;
      min-height: 100vh; display: flex; flex-direction: column;
    }

    h2 { font-size: 0.85rem; font-weight: normal; opacity: 0.35; margin: 0 0 40px; letter-spacing: 0.04em; }

    #login-view label { display: block; font-size: 0.8rem; opacity: 0.45; margin-bottom: 6px; }
    #login-view input {
      width: 100%; background: none; border: none; border-bottom: 1px solid rgba(255,255,255,0.2);
      color: #fff; font-family: Georgia, serif; font-size: 1rem; padding: 4px 0 6px;
      outline: none; transition: border-color 0.2s;
    }
    #login-view input:focus { border-bottom-color: rgba(255,255,255,0.6); }

    #post-view { flex: 1; display: flex; flex-direction: column; }
    .meta { font-size: 0.78rem; opacity: 0.35; margin: 0 0 32px; }
    .meta a { color: inherit; opacity: 0.7; }

    #body {
      flex: 1; min-height: 220px;
      background: none; border: none;
      color: #fff; font-family: Georgia, serif; font-size: 1.05rem;
      line-height: 1.7; resize: none; outline: none;
      caret-color: rgba(255,255,255,0.8);
      width: 100%;
    }
    #body::placeholder { color: rgba(255,255,255,0.2); }

    .actions { display: flex; align-items: center; gap: 20px; margin-top: 28px; padding-top: 16px; border-top: 1px solid rgba(255,255,255,0.08); }
    button.btn {
      background: none; border: 1px solid rgba(255,255,255,0.25); color: #fff;
      font-family: Georgia, serif; font-size: 0.88rem;
      padding: 5px 18px; border-radius: 3px; cursor: pointer;
      transition: border-color 0.2s, opacity 0.2s;
    }
    button.btn:hover { border-color: rgba(255,255,255,0.6); }

    #status { font-size: 0.8rem; opacity: 0.45; margin: 0; }
  </style>
</head>
<body>

<div id="backdrop-wrap">
  <div id="fire"></div>
</div>

<div id="wrap">
  <h2>cjre.pl — ruminations</h2>

  <div id="login-view">
    <label>password</label>
    <input type="password" id="token" placeholder="···" autocomplete="current-password"
           onkeydown="if(event.key==='Enter')login()">
    <div class="actions" style="margin-top:20px">
      <button class="btn" onclick="login()">sign in</button>
      <p id="status"></p>
    </div>
  </div>

  <div id="post-view" style="display:none">
    <p class="meta"><a href="#" onclick="logout();return false">sign out</a></p>
    <textarea id="body" placeholder="write something…" spellcheck="false"></textarea>
    <div class="actions">
      <button class="btn" onclick="publish()">publish</button>
      <p id="status"></p>
    </div>
  </div>
</div>

<script>
  // Load the same backdrop that's active on the main site
  (function() {
    const name = localStorage.getItem('backdrop') || 'fire';
    const opacity = parseFloat(localStorage.getItem('backdropOpacity') || '0.82');
    const wrap = document.getElementById('backdrop-wrap');
    wrap.style.opacity = opacity;
    window._backdropSpeed = parseFloat(localStorage.getItem('backdropSpeed') || '1');
    const s = document.createElement('script');
    s.src = name + '.js';
    document.head.appendChild(s);
  })();
</script>

<script>
  // Replace this with your deployed Worker URL
  const WORKER_URL = 'https://ruminations-worker.cjreplogle.workers.dev';
  const KEY = 'ruminations_authed';

  const statusEl = document.getElementById('status');
  function setStatus(msg) { statusEl.textContent = msg; }

  async function login() {
    const pw = document.getElementById('token').value.trim();
    if (!pw) { setStatus('enter password'); return; }
    // Verify password by attempting a publish with empty body (worker rejects empty before auth)
    // Instead just store and verify on first real publish — or do a quick ping
    localStorage.setItem(KEY, pw);
    showPostView();
    setStatus('');
  }

  function logout() {
    localStorage.removeItem(KEY);
    document.getElementById('login-view').style.display = '';
    document.getElementById('post-view').style.display = 'none';
    document.getElementById('token').value = '';
    setStatus('');
  }

  function showPostView() {
    document.getElementById('login-view').style.display = 'none';
    document.getElementById('post-view').style.display = 'flex';
    setTimeout(() => document.getElementById('body').focus(), 50);
  }

  async function publish() {
    const password = localStorage.getItem(KEY);
    const body = document.getElementById('body').value.trim();
    if (!body) { setStatus('write something first'); return; }
    setStatus('publishing…');
    try {
      const res = await fetch(WORKER_URL, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ password, body }),
      });
      const data = await res.json();
      if (data.ok) {
        setStatus('published');
        document.getElementById('body').value = '';
      } else if (res.status === 401) {
        setStatus('wrong password');
        logout();
      } else {
        setStatus('error: ' + (data.error || res.status));
      }
    } catch(e) { setStatus('error: ' + e.message); }
  }

  // Auto-show post view if previously signed in
  if (localStorage.getItem(KEY)) showPostView();
</script>
</body>
</html>
